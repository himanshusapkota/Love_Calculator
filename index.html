<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💘</span>
        <span>❤️</span>
        <span>💖</span>
    </div>

    <div class="container">
        <h1>❤️ Love Calculator ❤️</h1>
        <p>Find your love compatibility</p>

        <input type="text" id="name1" placeholder="Enter Your Name">
        <input type="text" id="name2" placeholder="Enter Partner Name">

        <div class="btns">
            <button onclick="calculateLove()">Calculate</button>
            <button onclick="resetLove()" class="reset">Reset</button>
        </div>

        <div id="loading"></div>

        <div class="result-box">
            <div id="percent"></div>

            <div class="progress">
                <div id="bar"></div>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
